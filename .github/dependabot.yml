version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '10:00'
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      npm-minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '10:15'
      timezone: America/Chicago
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    groups:
      github-actions:
        patterns:
          - '*'
