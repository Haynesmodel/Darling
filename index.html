<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Darling</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/easter-eggs.css" />
</head>
<body>
  <header>
    <div class="inner">
      <h1>The Darling</h1>
      <h2>The Darling</h2>
      <div class="banners" id="headerBanners"></div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" id="tabHistoryBtn">League History</button>
  </nav>

  <main>
    <section id="page-history" class="page">
      <div id="appStatus" class="status-banner status-loading" role="status" aria-live="polite">Loading league data...</div>
      <div class="card">
        <div class="controls filters">
          <label>Team:
            <select id="teamSelect"></select>
          </label>

          <div class="dropdown">
            <button class="btn dropdown-toggle" data-target="seasonFilters" aria-haspopup="true" aria-expanded="false" aria-controls="seasonFilters">
              Seasons <span class="count-text" id="seasonCountText">All</span> ▼
            </button>
            <div class="dropdown-menu" id="seasonFilters" role="group" aria-label="Season filters"></div>
          </div>

          <div class="dropdown">
            <button class="btn dropdown-toggle" data-target="weekFilters" aria-haspopup="true" aria-expanded="false" aria-controls="weekFilters">
              Weeks <span class="count-text" id="weekCountText">All</span> ▼
            </button>
            <div class="dropdown-menu" id="weekFilters" role="group" aria-label="Week filters"></div>
          </div>

          <div class="dropdown">
            <button class="btn dropdown-toggle" data-target="oppFilters" aria-haspopup="true" aria-expanded="false" aria-controls="oppFilters">
              Opponents <span class="count-text" id="oppCountText">All</span> ▼
            </button>
            <div class="dropdown-menu" id="oppFilters" role="group" aria-label="Opponent filters"></div>
          </div>

          <div class="dropdown">
            <button class="btn dropdown-toggle" data-target="typeFilters" aria-haspopup="true" aria-expanded="false" aria-controls="typeFilters">
              Types <span class="count-text" id="typeCountText">All</span> ▼
            </button>
            <div class="dropdown-menu" id="typeFilters" role="group" aria-label="Type filters"></div>
          </div>

          <div class="dropdown">
            <button class="btn dropdown-toggle" data-target="roundFilters" aria-haspopup="true" aria-expanded="false" aria-controls="roundFilters">
              Rounds <span class="count-text" id="roundCountText">All</span> ▼
            </button>
            <div class="dropdown-menu" id="roundFilters" role="group" aria-label="Round filters"></div>
          </div>

          <span style="flex:1"></span>
          <button id="exportCsv" class="btn">Export CSV</button>
          <button id="clearFilters" class="btn">Clear</button>
        </div>
      </div>

      <div class="card" id="teamOverview">
        <div id="teamOverviewGrid" class="overview-grid"></div>
      </div>
      <div id="seasonCallout"></div>

      <div class="card">
        <h3>Fun Facts</h3>
        <div id="funFacts" class="stats-grid fun-grid"></div>
        <div id="funLists" class="fun-lists"></div>
      </div>

      <div class="card">
        <h3 id="oppTableTitle">Opponent Breakdown</h3>
        <div id="rivalGroupCallouts" class="callouts"></div>
        <div class="table-wrap">
          <table id="oppTable">
            <thead>
              <tr>
                <th scope="col" id="oppFirstCol">Opponent</th>
                <th scope="col">Record</th>
                <th scope="col">Win %</th>
                <th scope="col">PPG</th>
                <th scope="col">OPPG</th>
                <th scope="col">Games</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h3>Season Recap</h3>
        <div class="table-wrap">
          <table id="seasonRecapTable">
            <thead>
              <tr>
                <th scope="col">Season</th>
                <th scope="col">Record</th>
                <th scope="col">Win %</th>
                <th scope="col">Finish</th>
                <th scope="col">Outcome</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h3>Week-by-Week</h3>
        <div class="table-wrap">
          <table id="weekTable">
            <thead>
              <tr>
                <th scope="col">Season</th>
                <th scope="col">Week</th>
                <th scope="col">Date</th>
                <th scope="col">Opponent</th>
                <th scope="col">Result</th>
                <th scope="col">Score</th>
                <th scope="col">XW</th>
                <th scope="col">Type</th>
                <th scope="col">Round</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h3>All Games</h3>
        <div class="table-wrap">
          <table id="historyGamesTable">
            <thead>
              <tr>
                <th scope="col">Date</th>
                <th scope="col">Opponent</th>
                <th scope="col">Result</th>
                <th scope="col">Score</th>
                <th scope="col">Type</th>
                <th scope="col">Round</th>
                <th scope="col">Season</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="fxCrown" class="fx-layer"></div>
  <div id="fxSaunders" class="fx-layer"></div>
  <div id="fxGroup" class="fx-layer"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
