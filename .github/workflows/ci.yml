name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Superseded PR revisions may be cancelled. Main runs are retained because they can
# own a production deployment; the Pages jobs serialize separately below.
concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name == 'push' && github.run_id || 'pr' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      VITE_BASE_PATH: /Darling/

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CSS architecture checks
        run: npm run lint:css && npm run check:css

      - name: Run unit/data test suite
        run: npm run test:unit:core

      - name: Run production build
        run: npm run build

      - name: Upload tested production build
        uses: actions/upload-artifact@v4
        with:
          name: darling-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  ui:
    name: ui
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Download tested production build
        uses: actions/download-artifact@v4
        with:
          name: darling-dist-${{ github.sha }}
          path: dist/

      - name: Audit downloaded production build
        run: npm run audit:dist

      - name: Run functional, keyboard, responsive, and accessibility UI suite
        run: npm run test:ui:preview

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: ui
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run coverage gate
        run: npm run test:coverage

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  package-pages:
    name: package-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [unit, ui, coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Download tested production build
        uses: actions/download-artifact@v4
        with:
          name: darling-dist-${{ github.sha }}
          path: dist/

      - name: Verify Pages payload
        shell: bash
        run: |
          test -s dist/index.html
          grep -q '/Darling/' dist/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy-pages:
    name: deploy-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: package-pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: pages-production
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Refuse to deploy a stale main commit
        id: current-main
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getBranch({
              ...context.repo,
              branch: 'main',
            });
            if (data.commit.sha !== context.sha) {
              core.setFailed(`Refusing stale deployment: ${context.sha} is not current main ${data.commit.sha}.`);
            }

      - name: Deploy tested build to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
